services:
  - type: web
    name: baby-checklist
    runtime: node
    plan: free
    region: oregon
    numInstances: 1
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
